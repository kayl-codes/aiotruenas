name: Auto Comment Conflicts
on:
  push:
    branches: [main]
  pull_request_target:
    types: [synchronize, opened]

permissions:
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Check for conflicts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
