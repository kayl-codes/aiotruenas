name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install "build==1.5.1"

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aiotruenas-dist-${{ github.event.release.tag_name }}
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    if: github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aiotruenas/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aiotruenas-dist-${{ github.event.release.tag_name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
